name: Build All (FFmpeg + Rubberband + Avalonia)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  AVALONIA_PROJECT: "Warp/Warp.csproj"   # <- change to your project path

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash {0}' }}
    steps:

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Avalonia app (self-contained)
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            RUNTIME="linux-x64"
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            RUNTIME="osx-x64"
          else
            RUNTIME="win-x64"
            export PATH="/c/Program Files/dotnet:$PATH"
          fi
          dotnet publish $AVALONIA_PROJECT -c Release -r $RUNTIME --self-contained true -o output

    
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout FFmpeg-warp
        uses: actions/checkout@v4
        with:
          repository: mafteialbert/FFmpeg-warp
          path: ffmpeg

      - name: Checkout Rubberband-warp
        uses: actions/checkout@v4
        with:
          repository: mafteialbert/rubberband-warp
          path: rubberband

      - name: Checkout nv-codec-headers
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/nv-codec-headers
          path: nv-codec-headers

      - name: Setup MSYS2 and install packages
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: |
            git
            make
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-yasm
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-x264
            mingw-w64-x86_64-ffnvcodec-headers
            mingw-w64-x86_64-meson 
            mingw-w64-x86_64-libsndfile 
            mingw-w64-x86_64-libsamplerate 
            mingw-w64-x86_64-fftw

      - name: Build Windows 
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          set -e
          git clone https://code.videolan.org/videolan/x264.git
          cd x264
          ./configure \
            --host=x86_64-w64-mingw32 \
            --enable-static \
            --disable-cli \
            --disable-opencl
          make -j$(nproc)
          cp libx264.a /mingw64/lib/
          cp x264_config.h x264.h /mingw64/include/

          

          # Ensure MSYS2 mingw64 is used
          export PATH="/mingw64/bin:$PATH"
          cd $GITHUB_WORKSPACE/nv-codec-headers
          make install
          cd $GITHUB_WORKSPACE/rubberband
          meson setup build -Ddefault_library=static -Dcmdline=enabled
          meson compile -C build
          cp build/rubberband.exe $GITHUB_WORKSPACE/rubberband-windows.exe

          cd $GITHUB_WORKSPACE/ffmpeg
          PKG_CONFIG_PATH="/mingw64/lib/pkgconfig"
          export PKG_CONFIG_PATH
          ./configure \
            --prefix="$PWD/out" \
            --enable-gpl \
            --enable-nonfree \
            --enable-libx264 \
            --enable-nvenc \
            --extra-cflags="-I/mingw64/include" \
            --extra-ldflags="-L/mingw64/lib"
          make -j$(nproc)
          make install

          cp out/bin/ffmpeg.exe $GITHUB_WORKSPACE/ffmpeg-windows.exe
          cp out/bin/ffprobe.exe $GITHUB_WORKSPACE/ffprobe-windows.exe

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -e

          sudo apt update
          sudo apt install -y autoconf automake build-essential \
            pkg-config yasm nasm libx264-dev libsndfile1-dev libsamplerate0-dev \
            libva-dev libdrm-dev libavdevice-dev

          # NVENC headers (compile-only)
          cd $GITHUB_WORKSPACE/nv-codec-headers
          make
          sudo make install
          
          sudo apt update
          sudo apt install -y build-essential meson libsndfile1-dev libsamplerate0-dev libfftw3-dev
          cd $GITHUB_WORKSPACE/rubberband
          meson setup build -Ddefault_library=static -Dcmdline=enabled
          meson compile -C build
          cp build/rubberband $GITHUB_WORKSPACE/rubberband-linux

          cd $GITHUB_WORKSPACE/ffmpeg
          ./configure \
            --prefix="$PWD/out" \
            --enable-gpl \
            --enable-nonfree \
            --enable-libx264 \
            --enable-nvenc \
            --enable-vaapi \
            --extra-cflags="-I/usr/include" \
            --extra-ldflags="-L/usr/lib"

          make -j$(nproc)
          make install

          # copy artefacts for packaging
          cp out/bin/ffmpeg $GITHUB_WORKSPACE/ffmpeg-linux
          cp out/bin/ffprobe $GITHUB_WORKSPACE/ffprobe-linux

      # ----------------------------
      # macOS: build x264 + FFmpeg (videotoolbox)
      # ----------------------------
      - name: Build on macOS (x264 + ffmpeg with videotoolbox)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install yasm nasm pkg-config libsamplerate libsndfile x264
          brew install meson pkg-config libsamplerate libsndfile fftw
          cd $GITHUB_WORKSPACE/rubberband
          meson setup build -Ddefault_library=static -Dcmdline=enabled
          meson compile -C build
          cp build/rubberband $GITHUB_WORKSPACE/rubberband-macos
          cd $GITHUB_WORKSPACE/ffmpeg
          ./configure \
            --prefix="$PWD/out" \
            --enable-gpl \
            --enable-libx264 \
            --enable-videotoolbox \
            --extra-cflags="-I/usr/local/include" \
            --extra-ldflags="-L/usr/local/lib"
          make -j$(sysctl -n hw.ncpu)
          make install
          cp out/bin/ffmpeg $GITHUB_WORKSPACE/ffmpeg-macos
          cp out/bin/ffprobe $GITHUB_WORKSPACE/ffprobe-macos

      
      # ----------------------------
      # Copy native binaries into app bundle
      # ----------------------------
      - name: Copy Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          cp $GITHUB_WORKSPACE/ffmpeg-linux output/res/ffmpeg 
          cp $GITHUB_WORKSPACE/ffprobe-linux output/res/ffprobe 
          cp $GITHUB_WORKSPACE/rubberband-linux output/res/rubberband 
      
      - name: Copy Windows
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          cp $GITHUB_WORKSPACE/ffmpeg-windows.exe output/res/ffmpeg.exe 
          cp $GITHUB_WORKSPACE/ffprobe-windows.exe output/res/ffprobe.exe 
          cp $GITHUB_WORKSPACE/rubberband-windows.exe output/res/rubberband.exe 
          
      - name: Copy macOS
        if: matrix.os == 'macos-latest'
        run: |
          cp $GITHUB_WORKSPACE/ffmpeg-macos output/res/ffmpeg
          cp $GITHUB_WORKSPACE/ffprobe-macos output/res/ffprobe 
          cp $GITHUB_WORKSPACE/rubberband-macos output/res/rubberband 
          
          
      - name: Zip final bundle
        run: |
          cd output
          zip -r "../Warp-${{ matrix.os }}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Warp-${{ matrix.os }}
          path: Warp-${{ matrix.os }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: builds
      - uses: softprops/action-gh-release@v2
        with:
          files: builds/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
